services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./audit_data:/app/audit_data
    environment:
      - DATABASE_URL=sqlite:///audit_data/audit.db
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --log-level info
      --workers 2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
